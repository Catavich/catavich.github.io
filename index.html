<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>אליאס</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --primary: #0d6efd;
            --success: #198754;
            --danger: #dc3545;
            --warning: #ffc107;
            --secondary: #6c757d;
            
            --diff-easy: #198754;
            --diff-medium: #fd7e14;
            --diff-hard: #dc3545;
        }

        * { box-sizing: border-box; font-family: system-ui, sans-serif; touch-action: manipulation; }
        
        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            overflow-x: hidden; 
        }

        #app { 
            max-width: 600px; 
            margin: 0 auto; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding: 10px;
        }

        .screen { 
            display: none; 
            flex-direction: column; 
            flex-grow: 1; 
            padding: 20px; 
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }
        .screen.active { display: flex; }

        /* Typography */
        h1 { font-size: 2.5rem; text-align: center; margin-top: 10px; margin-bottom: 20px; }
        h2 { font-size: 1.3rem; border-bottom: 2px solid #dee2e6; padding-bottom: 8px; margin-top: 0; }
        
        /* Settings / Menu */
        .settings-card { background: rgba(255,255,255,0.8); border-radius: 12px; padding: 15px; border: 1px solid #dee2e6; margin-bottom: 20px; }
        .settings-group { margin-bottom: 15px; }
        .settings-group h3 { font-size: 1.1rem; margin: 0 0 10px 0; color: #495057; }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 1rem; cursor: pointer; }
        .checkbox-label input { width: 18px; height: 18px; cursor: pointer; }

        /* Game Screen */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #timer { font-size: 3rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        
        .word-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 200px; }
        #current-word { font-size: 3.5rem; margin: 0; word-break: break-word; line-height: 1.2; font-weight: 800; transition: color 0.3s; }
        #word-difficulty { font-size: 1.2rem; margin-top: 10px; font-weight: bold; }

        /* Controls */
        .controls { display: flex; gap: 15px; justify-content: center; padding-bottom: 10px; flex-wrap: wrap; }
        .btn { border: none; border-radius: 12px; padding: 15px; font-size: 1.5rem; cursor: pointer; font-weight: bold; flex: 1; min-width: 120px; color: white; transition: opacity 0.2s; }
        .btn:active { opacity: 0.8; }
        .btn.small { padding: 8px 15px; font-size: 1.1rem; min-width: auto; flex: none; background-color: var(--secondary); border-radius: 8px; }
        .btn.full { width: 100%; flex: none; margin-top: 10px; }

        .btn-primary { background-color: var(--primary); }
        .btn-success { background-color: var(--success); }
        .btn-danger { background-color: var(--danger); }
        .btn-warning { background-color: var(--warning); color: black; }
        .btn-secondary { background-color: var(--secondary); }

        /* Score Screen */
        .score-row { display: flex; justify-content: space-between; font-size: 1.3rem; margin-bottom: 10px; padding: 10px; background: rgba(255,255,255,0.8); border: 1px solid #dee2e6; border-radius: 8px; }
        .score-total { font-weight: bold; font-size: 1.6rem; border-top: 2px solid var(--text-color); margin-top: 15px; padding-top: 15px; }
        .score-stolen { color: var(--danger); font-weight: bold; margin-top: 15px; }

        .hidden { display: none !important; }
        
        /* Difficulty Colors */
        .color-easy { color: var(--diff-easy); }
        .color-medium { color: var(--diff-medium); }
        .color-hard { color: var(--diff-hard); }
    </style>
</head>
<body>
    <div id="app">
        <!-- MENU SCREEN -->
        <div id="menu-screen" class="screen active">
            <h1>אליאס</h1>
            
            <div class="settings-card">
                <h2>הגדרות משחק</h2>
                
                <div class="settings-group">
                    <h3>קטגוריות מובנות</h3>
                    <div id="categories-container" class="checkbox-grid"></div>
                </div>

                <div class="settings-group">
                    <h3>רמות קושי (לקטגוריות מובנות)</h3>
                    <div id="difficulties-container" class="checkbox-grid"></div>
                </div>
            </div>

            <button id="btn-start" class="btn btn-primary full">התחל משחק (תור רגיל)</button>
            <button id="btn-start-red-menu" class="btn btn-danger full" style="margin-top: 10px;">התחל משחק (סבב אדום)</button>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="screen">
            <div class="header">
                <div id="timer">01:00</div>
                <button id="btn-pause" class="btn small">השהה</button>
            </div>
            
            <div id="red-round-counter" class="hidden" style="font-size: 1.5rem; font-weight: bold; text-align: center; color: var(--danger); margin-bottom: 10px;">כרטיס 0 מתוך 5</div>
            
            <div class="word-container">
                <div id="current-word">טוען...</div>
                <div id="word-difficulty"></div>
            </div>
            
            <div id="game-controls" class="controls">
                <button id="btn-correct" class="btn btn-success">הבא</button>
                <button id="btn-enemy-correct" class="btn btn-warning hidden">קבוצה יריבה</button>
                <button id="btn-skip" class="btn btn-danger">דלג</button>
                <button id="btn-stolen" class="btn btn-danger full hidden">נחטף! (+1 ליריב)</button>
                <button id="btn-finish" class="btn btn-success full hidden">סיים</button>
            </div>
        </div>

        <!-- SCORE SCREEN -->
        <div id="score-screen" class="screen">
            <h1>תוצאות תור</h1>
            
            <div class="score-row">
                <span>מילים שנוחשו (+1):</span>
                <span id="score-correct" class="color-easy">0</span>
            </div>
            <div class="score-row">
                <span>מילים שדולגו (-1):</span>
                <span id="score-skipped" class="color-hard">0</span>
            </div>
            <div class="score-row score-total">
                <span>סך הכל לתור:</span>
                <span id="score-total">0</span>
            </div>
            
            <div class="score-row score-stolen hidden" id="stolen-container">
                <span>נקודות ליריב (נחטף):</span>
                <span id="score-stolen">+0</span>
            </div>

            <div class="controls" style="margin-top: 20px;">
                <button id="btn-next-turn" class="btn btn-primary full">התחל תור רגיל</button>
                <button id="btn-start-red-score" class="btn btn-danger full">התחל סבב אדום</button>
                <button id="btn-end-game" class="btn btn-secondary full">סיים משחק (חזור לתפריט)</button>
            </div>
        </div>
    </div>

    <script>
        // Data Structures
        let rawData = {};
        
        let sessionWordsPool = []; // Global pool for the session to prevent repeats
        let currentWord = null;
        let score = { correct: 0, skipped: 0, stolen: 0 };
        
        let timerInterval;
        let timeLeft = 60;
        let isPaused = false;
        let isTimeUp = false;
        let wakeLock = null;
        
        let isRedRound = false;
        let redCardsPlayed = 0;
        const RED_ROUND_MAX = 5;

        // Sound Effects
        const timeUpSound = new Audio('timeup.mp3');

        const difficultyColors = {
            "קל": "color-easy",
            "בינוני": "color-medium",
            "קשה": "color-hard"
        };

        // DOM Elements
        const screens = {
            menu: document.getElementById('menu-screen'),
            game: document.getElementById('game-screen'),
            score: document.getElementById('score-screen')
        };
        const wordDisplay = document.getElementById('current-word');
        const difficultyDisplay = document.getElementById('word-difficulty');
        const timerDisplay = document.getElementById('timer');
        const redRoundCounter = document.getElementById('red-round-counter');
        const btnPause = document.getElementById('btn-pause');
        const btnCorrect = document.getElementById('btn-correct');
        const btnEnemyCorrect = document.getElementById('btn-enemy-correct');
        const btnSkip = document.getElementById('btn-skip');
        const btnStolen = document.getElementById('btn-stolen');
        const btnFinish = document.getElementById('btn-finish');
        const btnNextTurn = document.getElementById('btn-next-turn');
        const btnStartRedScore = document.getElementById('btn-start-red-score');

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log(`Wake Lock error: ${err.message}`);
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => {
                    wakeLock = null;
                });
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && !isPaused && !isTimeUp) {
                requestWakeLock();
            }
        });

        async function loadData() {
            try {
                const response = await fetch('words.json');
                if (!response.ok) throw new Error("File not found");
                rawData = await response.json();
            } catch (error) {
                console.warn("Could not load words.json, using fallback data.");
                rawData = {
                    "חיות (דוגמה)": {
                        "קל": ["כלב", "חתול", "אריה"],
                        "בינוני": ["קרנף", "ינשוף", "תמנון"],
                        "קשה": ["קפיברה", "שנבוב", "פנגולין"]
                    }
                };
            }
            initSettings();
        }

        function initSettings() {
            const categories = Object.keys(rawData);
            const difficulties = new Set();
            
            categories.forEach(cat => {
                Object.keys(rawData[cat]).forEach(diff => difficulties.add(diff));
            });

            const catContainer = document.getElementById('categories-container');
            catContainer.innerHTML = '';
            categories.forEach(cat => {
                catContainer.innerHTML += `
                    <label class="checkbox-label">
                        <input type="checkbox" value="${cat}" class="cat-checkbox" checked>
                        ${cat}
                    </label>
                `;
            });

            const diffContainer = document.getElementById('difficulties-container');
            diffContainer.innerHTML = '';
            difficulties.forEach(diff => {
                diffContainer.innerHTML += `
                    <label class="checkbox-label">
                        <input type="checkbox" value="${diff}" class="diff-checkbox" checked>
                        ${diff}
                    </label>
                `;
            });
        }

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        // Creates the session pool. Words are removed from here as they are played.
        function buildSessionPool() {
            const selectedCats = Array.from(document.querySelectorAll('.cat-checkbox:checked')).map(cb => cb.value);
            const selectedDiffs = Array.from(document.querySelectorAll('.diff-checkbox:checked')).map(cb => cb.value);
            
            sessionWordsPool = [];
            
            // Add standard words
            selectedCats.forEach(cat => {
                selectedDiffs.forEach(diff => {
                    if (rawData[cat] && rawData[cat][diff]) {
                        rawData[cat][diff].forEach(text => {
                            sessionWordsPool.push({ text, category: cat, difficulty: diff });
                        });
                    }
                });
            });

            // Shuffle
            for (let i = sessionWordsPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [sessionWordsPool[i], sessionWordsPool[j]] = [sessionWordsPool[j], sessionWordsPool[i]];
            }
        }

        // Starts a brand new game (resets the session pool)
        function startNewGame(redRound = false) {
            buildSessionPool();
            
            if (sessionWordsPool.length === 0) {
                alert("אנא בחר לפחות קטגוריה אחת המכילה מילים.");
                return;
            }
            if (redRound) {
                startRedRound();
            } else {
                startTurn();
            }
        }

        // Starts a single 60s turn using the existing session pool
        function startTurn() {
            if (sessionWordsPool.length === 0) {
                alert("נגמרו המילים במאגר! חזור לתפריט להתחיל משחק חדש.");
                switchScreen('menu');
                return;
            }

            isRedRound = false;
            score = { correct: 0, skipped: 0, stolen: 0 };
            currentWord = null;
            timeLeft = 60;
            isPaused = false;
            isTimeUp = false;

            redRoundCounter.classList.add('hidden');
            timerDisplay.style.color = "inherit";

            btnCorrect.classList.remove('hidden');
            btnCorrect.textContent = "הבא";
            
            btnEnemyCorrect.classList.add('hidden');
            
            btnSkip.classList.remove('hidden');
            btnSkip.classList.remove('btn-secondary');
            btnSkip.classList.add('btn-danger');
            btnSkip.textContent = "דלג";

            btnStolen.classList.add('hidden');
            btnFinish.classList.add('hidden');
            
            btnPause.classList.remove('hidden');
            btnPause.textContent = 'השהה';
            wordDisplay.classList.remove('color-easy', 'color-medium', 'color-hard');
            
            requestWakeLock();
            updateTimerDisplay();
            switchScreen('game');
            showNextWord();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function startRedRound() {
            if (sessionWordsPool.length === 0) {
                alert("נגמרו המילים במאגר! חזור לתפריט להתחיל משחק חדש.");
                switchScreen('menu');
                return;
            }

            isRedRound = true;
            redCardsPlayed = 0;
            score = { correct: 0, skipped: 0, stolen: 0 };
            currentWord = null;
            isPaused = false;
            isTimeUp = false;
            clearInterval(timerInterval);

            timerDisplay.textContent = "סבב אדום";
            timerDisplay.style.color = "var(--danger)";
            
            redRoundCounter.classList.remove('hidden');
            updateRedRoundCounterDisplay();

            btnCorrect.classList.remove('hidden');
            btnCorrect.textContent = "קבוצה משחקת";
            
            btnEnemyCorrect.classList.remove('hidden');
            
            btnSkip.classList.remove('hidden');
            btnSkip.classList.remove('btn-danger');
            btnSkip.classList.add('btn-secondary');
            btnSkip.textContent = "דלג (חינם)";

            btnStolen.classList.add('hidden');
            btnFinish.classList.add('hidden');
            
            btnPause.classList.remove('hidden');
            btnPause.textContent = 'השהה';
            wordDisplay.classList.remove('color-easy', 'color-medium', 'color-hard');
            
            requestWakeLock();
            switchScreen('game');
            showNextWord();
        }

        function updateRedRoundCounterDisplay() {
            redRoundCounter.textContent = `כרטיס ${redCardsPlayed + 1} מתוך ${RED_ROUND_MAX}`;
        }

        function showNextWord() {
            if (sessionWordsPool.length === 0) {
                wordDisplay.textContent = "נגמרו המילים במאגר!";
                wordDisplay.className = '';
                difficultyDisplay.textContent = "";
                clearInterval(timerInterval);
                setTimeout(showScoreScreen, 1500);
                return;
            }

            // Pop word from the session pool to ensure it never repeats
            currentWord = sessionWordsPool.pop();
            
            wordDisplay.textContent = currentWord.text;
            difficultyDisplay.textContent = `(${currentWord.difficulty})`;
            wordDisplay.className = difficultyColors[currentWord.difficulty] || '';
        }

        function updateTimer() {
            if (isPaused || isTimeUp) return;
            
            timeLeft--;
            updateTimerDisplay();
            
            if (timeLeft <= 0) {
                handleTimeUp();
            }
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
            
            if (timeLeft <= 10 && timeLeft > 0 && !isTimeUp) {
                timerDisplay.style.color = 'var(--danger)';
            } else {
                timerDisplay.style.color = 'inherit';
            }
        }

        function handleTimeUp() {
            isTimeUp = true;
            clearInterval(timerInterval);
            timerDisplay.textContent = "00:00";
            
            // Play sound effect
            timeUpSound.play().catch(err => console.log("Audio playback prevented:", err));
            
            btnPause.classList.add('hidden');
            btnCorrect.classList.add('hidden');
            btnSkip.classList.add('hidden');
            
            btnStolen.classList.remove('hidden');
            btnFinish.classList.remove('hidden');
        }

        function togglePause() {
            if (isTimeUp) return;
            isPaused = !isPaused;
            btnPause.textContent = isPaused ? 'המשך' : 'השהה';
            
            if (isPaused) {
                wordDisplay.style.visibility = 'hidden';
                difficultyDisplay.style.visibility = 'hidden';
            } else {
                wordDisplay.style.visibility = 'visible';
                difficultyDisplay.style.visibility = 'visible';
            }
        }

        function showScoreScreen() {
            releaseWakeLock();
            switchScreen('score');
            
            if (isRedRound) {
                document.querySelector('#score-screen h1').textContent = "תוצאות סבב אדום";
            } else {
                document.querySelector('#score-screen h1').textContent = "תוצאות תור";
            }
            
            document.getElementById('score-correct').textContent = score.correct;
            document.getElementById('score-skipped').textContent = score.skipped;
            
            const total = score.correct - score.skipped;
            document.getElementById('score-total').textContent = total;
            
            const stolenContainer = document.getElementById('stolen-container');
            if (score.stolen > 0) {
                stolenContainer.classList.remove('hidden');
                document.getElementById('score-stolen').textContent = `+${score.stolen}`;
            } else {
                stolenContainer.classList.add('hidden');
            }

            const btnEndGame = document.getElementById('btn-end-game');

            if (sessionWordsPool.length === 0) {
                btnNextTurn.classList.add('hidden');
                btnStartRedScore.classList.add('hidden');
                
                btnEndGame.textContent = "נגמרו המילים! (חזור לתפריט)";
                btnEndGame.classList.remove('btn-secondary');
                btnEndGame.classList.add('btn-primary');
            } else {
                btnNextTurn.classList.remove('hidden');
                btnNextTurn.textContent = "התחל תור רגיל";
                
                btnStartRedScore.classList.remove('hidden');
                
                btnEndGame.textContent = "סיים משחק (חזור לתפריט)";
                btnEndGame.classList.remove('btn-primary');
                btnEndGame.classList.add('btn-secondary');
            }
        }

        // Event Listeners
        document.getElementById('btn-start').addEventListener('click', () => startNewGame(false));
        document.getElementById('btn-start-red-menu').addEventListener('click', () => startNewGame(true));
        
        btnPause.addEventListener('click', togglePause);
        
        btnCorrect.addEventListener('click', () => {
            if(isPaused || isTimeUp) return;
            score.correct++;
            
            if (isRedRound) {
                redCardsPlayed++;
                if (redCardsPlayed >= RED_ROUND_MAX) {
                    showScoreScreen();
                } else {
                    updateRedRoundCounterDisplay();
                    showNextWord();
                }
            } else {
                showNextWord();
            }
        });

        btnEnemyCorrect.addEventListener('click', () => {
            if (isPaused || isTimeUp || !isRedRound) return;
            score.stolen++;
            redCardsPlayed++;
            
            if (redCardsPlayed >= RED_ROUND_MAX) {
                showScoreScreen();
            } else {
                updateRedRoundCounterDisplay();
                showNextWord();
            }
        });
        
        btnSkip.addEventListener('click', () => {
            if(isPaused || isTimeUp) return;
            
            if (isRedRound) {
                // Free skip: return to the bottom of the pool
                if (currentWord) {
                    sessionWordsPool.unshift(currentWord);
                }
                showNextWord();
            } else {
                score.skipped++;
                showNextWord();
            }
        });

        btnStolen.addEventListener('click', () => {
            score.stolen++;
            showScoreScreen();
        });

        btnFinish.addEventListener('click', () => {
            score.correct++;
            showScoreScreen();
        });
        
        btnNextTurn.addEventListener('click', startTurn);
        btnStartRedScore.addEventListener('click', startRedRound);
        
        document.getElementById('btn-end-game').addEventListener('click', () => {
            switchScreen('menu');
        });

        // Initialize App
        loadData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אליאס - משחק ניחוש מילים</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1 class="game-title">אליאס</h1>
    <div class="game-controls">
      <button id="start-btn" class="primary-btn">התחל משחק</button>
      <div class="timer-container">
        <span id="timer">01:00</span>
        <button id="pause-btn" class="pause-btn" title="השהה">⏸️</button>
      </div>
    </div>
    <div id="word-container" class="word-container"></div>
    <div id="gameplay-buttons" class="gameplay-buttons">
      <button id="next-btn" class="action-btn">הבא</button>
      <button id="skip-btn" class="action-btn">דלג</button>
    </div>
    <button id="stolen-btn" class="stolen-btn" style="display:none;">נחטף</button>
    <section id="score-summary" class="score-summary" style="display:none;">
      <h2>סיכום נקודות</h2>
      <div id="score-details"></div>
      <button id="restart-btn" class="primary-btn">התחל מחדש</button>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>

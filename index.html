<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת קובץ JSON</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #222; color: #0f0; }
        #output { white-space: pre-wrap; word-wrap: break-word; border: 1px solid #0f0; padding: 10px; }
    </style>
</head>
<body>
    <h1>אבחון טעינת נתונים</h1>
    <div id="output">טוען נתונים...</div>

    <script>
        async function testFetch() {
            const output = document.getElementById('output');
            try {
                // This is the line that fails on your hard drive but works on GitHub
                const response = await fetch('words.json');
                
                if (!response.ok) {
                    throw new Error(`שגיאת שרת: ${response.status}`);
                }

                const data = await response.json();
                output.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                output.style.color = 'red';
                output.textContent = "שגיאה בטעינת הקובץ: " + error.message;
            }
        }

        testFetch();
    </script>
</body>
</html>
